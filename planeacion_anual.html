<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>planeación anual · tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f3ef; --surface: #ffffff; --surface2: #f0ede8;
      --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
      --text: #1a1916; --text2: #6a6760; --text3: #aaa89f;
      --accent: #8a6a4a; --accent2: #b09070; --normal: #3a6a52;
      --urgent: #b84030; --warn: #9a7030;
      --psic: #7a4a9a; --soft: #2c6fad; --lang: #3a7a6a;
      --r: 10px; --r-sm: 6px;
      --done-bg: rgba(58,106,74,0.12); --done-text: #3a6a52;
    }
    [data-theme="dark"] {
      --bg: #141414; --surface: #1e1e1e; --surface2: #282828;
      --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.18);
      --text: #f0ede6; --text2: #c9a96e; --text3: #7a6a55;
      --accent: #c9a96e; --accent2: #a08050; --normal: #6aaa82;
      --urgent: #d4694a; --warn: #c9a030;
      --psic: #a870d0; --soft: #4a9fd4; --lang: #5aaa8a;
      --done-bg: rgba(106,170,130,0.15); --done-text: #6aaa82;
    }
    [data-theme="dark"] .section-label, [data-theme="dark"] .nav-title,
    [data-theme="dark"] .day-name, [data-theme="dark"] .task-text { font-weight: 500; }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 22px; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 0 0 6rem; transition: background 0.2s, color 0.2s; }

    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem 1rem; border-bottom: 0.5px solid var(--border); }
    .day-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--accent); letter-spacing: 0.08em; }
    .full-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .btn-back { background: none; border: 0.5px solid var(--border2); border-radius: var(--r-sm); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.2s; }
    .btn-back:hover { color: var(--accent); border-color: var(--accent2); }
    .content { padding: 1.25rem 1.25rem 0; display: flex; flex-direction: column; gap: 1.5rem; }
    .section-label { font-size: 11px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 0.6rem; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1rem 1.125rem; }
    input[type=number] { font-family: 'DM Mono', monospace; font-size: 12px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 4px 6px; outline: none; width: 60px; text-align: center; }
    input[type=number]:focus { border-color: var(--border2); }
    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: var(--r-sm); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; padding: 7px 14px; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }

    /* ── THIS MONTH ── */
    .month-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 0.875rem; }
    .month-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: var(--accent); }
    .month-sub { font-size: 11px; color: var(--text3); }

    .this-month-grid { display: flex; flex-direction: column; gap: 6px; }
    .tm-cat { display: flex; gap: 8px; align-items: flex-start; padding: 8px 10px; background: var(--surface2); border-radius: var(--r-sm); border-left: 2px solid var(--border2); }
    .tm-cat-label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); width: 70px; flex-shrink: 0; padding-top: 1px; }
    .tm-tasks { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .tm-task { display: flex; align-items: center; gap: 7px; cursor: pointer; }
    .tm-task-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tm-task-text { font-size: 12px; color: var(--text); line-height: 1.4; }
    .tm-task.done .tm-task-text { text-decoration: line-through; color: var(--text3); }
    .pay-badge { font-size: 10px; font-weight: 500; color: #fff; background: var(--normal); border-radius: 999px; padding: 1px 8px; margin-left: 4px; }

    /* ── ANNUAL TABLE ── */
    .table-scroll { overflow-x: auto; }
    .table-scroll::-webkit-scrollbar { height: 3px; }
    .table-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .annual-table { border-collapse: collapse; width: 100%; min-width: 900px; }
    .annual-table th { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); padding: 6px 8px; border-bottom: 0.5px solid var(--border); text-align: left; white-space: nowrap; position: sticky; top: 0; background: var(--surface); z-index: 2; }
    .annual-table th.month-col { color: var(--accent); }
    .annual-table td { vertical-align: top; padding: 6px 8px; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); font-size: 11px; min-width: 110px; }
    .annual-table td:first-child { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent2); font-weight: 500; white-space: nowrap; position: sticky; left: 0; background: var(--surface); z-index: 1; min-width: 70px; }
    .annual-table tr.current-month td { background: rgba(138,106,74,0.05); }
    .annual-table tr.current-month td:first-child { color: var(--accent); }

    .task-item { display: flex; align-items: flex-start; gap: 5px; margin-bottom: 3px; cursor: pointer; padding: 2px 3px; border-radius: 3px; transition: background 0.15s; }
    .task-item:hover { background: rgba(138,106,74,0.07); }
    .task-item.done .task-text { text-decoration: line-through; color: var(--text3); }
    .task-item.done { opacity: 0.6; }
    .task-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .task-text { font-size: 11px; color: var(--text); line-height: 1.4; }
    .pay-tag { display: inline-block; font-size: 9px; font-weight: 500; color: #fff; background: var(--normal); border-radius: 999px; padding: 0px 5px; margin-left: 3px; }
    .cell-empty { color: var(--text3); font-size: 10px; font-style: italic; }

    /* ── PROGRESS ── */
    .progress-section { display: flex; flex-direction: column; gap: 12px; }
    .prog-item { background: var(--surface2); border-radius: var(--r-sm); padding: 10px 12px; }
    .prog-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .prog-title { font-size: 12px; color: var(--text); }
    .prog-nums { font-size: 11px; color: var(--text2); }
    .prog-track { height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .prog-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .prog-sub { font-size: 10px; color: var(--text3); }
    .prog-edit-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 6px; border-top: 0.5px solid var(--border); padding-top: 6px; }
    .prog-edit-label { font-size: 10px; color: var(--text3); }

    /* BOOK EDITOR — hidden by default */
    .book-edit-panel { display: none; margin-top: 8px; border-top: 0.5px solid var(--border); padding-top: 8px; }
    .book-edit-panel.open { display: block; }
    .book-edit-grid { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; margin-bottom: 8px; }
    .book-edit-row { display: flex; gap: 8px; align-items: center; font-size: 11px; }
    .book-edit-name { flex: 1; color: var(--text2); font-size: 10px; }
    .btn-edit-pages { font-size: 11px; font-family: 'DM Mono', monospace; background: none; border: 0.5px solid var(--border2); border-radius: var(--r-sm); color: var(--text3); padding: 3px 10px; cursor: pointer; transition: all 0.15s; margin-top: 5px; }
    .btn-edit-pages:hover { color: var(--accent); border-color: var(--accent2); }

    /* MONTHLY PROGRESS */
    .month-prog-section { display: flex; flex-direction: column; gap: 6px; margin-top: 0.875rem; border-top: 0.5px solid var(--border); padding-top: 0.875rem; }
    .month-prog-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
    .month-prog-item { display: flex; align-items: center; gap: 8px; }
    .month-prog-label { font-size: 11px; color: var(--text2); width: 80px; flex-shrink: 0; }
    .month-prog-track { flex: 1; height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; }
    .month-prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .month-prog-num { font-size: 10px; color: var(--text3); white-space: nowrap; }

    /* TABLE EDITOR MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--r); padding: 1.25rem; width: 100%; max-width: 520px; margin: auto; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 0.5px solid var(--border); padding-bottom: 0.75rem; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--text); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; padding-top: 0.75rem; border-top: 0.5px solid var(--border); }
    .ed-cat-block { margin-bottom: 1rem; }
    .ed-cat-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent2); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .ed-cat-label::after { content:''; flex:1; height:0.5px; background:var(--border); }
    .ed-task-row { display: flex; gap: 6px; align-items: center; margin-bottom: 5px; }
    .ed-task-row input[type=text] { flex: 1; font-family: 'DM Mono', monospace; font-size: 12px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 5px 8px; outline: none; width: 100%; }
    .ed-task-row input[type=text]:focus { border-color: var(--border2); }
    .ed-task-row select { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 5px 6px; outline: none; width: 80px; }
    .ed-task-row input[type=number] { width: 65px; }
    .btn-del-sm { background: none; border: none; color: var(--text3); font-size: 12px; cursor: pointer; transition: color 0.15s; padding: 0 2px; }
    .btn-del-sm:hover { color: var(--urgent); }
    .btn-add-task { font-size: 11px; font-family: 'DM Mono', monospace; background: none; border: 0.5px dashed var(--border2); border-radius: var(--r-sm); color: var(--text3); padding: 4px 10px; cursor: pointer; width: 100%; margin-top: 3px; transition: all 0.15s; }
    .btn-add-task:hover { color: var(--accent); border-color: var(--accent2); }
    .btn-ghost { background: none; border: 0.5px solid var(--border2); border-radius: var(--r-sm); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 14px; cursor: pointer; transition: all 0.2s; }
    .btn-ghost:hover { color: var(--accent); border-color: var(--accent2); }

    .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
    .nav-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1rem; text-decoration: none; display: flex; flex-direction: column; gap: 5px; transition: border-color 0.2s; }
    .nav-card:hover { border-color: var(--border2); background: var(--surface2); }
    .nav-num { font-size: 11px; color: var(--text3); }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--text); }
    .nav-sub { font-size: 10px; color: var(--text3); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── HAMBURGER MENU ── */
    .menu-btn { background: none; border: 0.5px solid var(--border2); border-radius: var(--r-sm); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 16px; padding: 5px 10px; cursor: pointer; transition: all 0.2s; line-height: 1; }
    .menu-btn:hover { color: var(--accent); border-color: var(--accent2); }
    .menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; }
    .menu-overlay.open { display: block; }
    .menu-drawer { position: fixed; top: 0; right: -280px; bottom: 0; width: 260px; background: var(--surface); border-left: 0.5px solid var(--border2); z-index: 301; padding: 0; transition: right 0.25s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; overflow-y: auto; }
    .menu-drawer.open { right: 0; }
    .menu-drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.25rem 1rem; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .menu-drawer-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; color: var(--accent); font-style: italic; }
    .menu-close { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 0; transition: color 0.15s; }
    .menu-close:hover { color: var(--text); }
    .menu-section { padding: 0.75rem 0; border-bottom: 0.5px solid var(--border); }
    .menu-section:last-child { border-bottom: none; }
    .menu-section-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 0 1.25rem; margin-bottom: 4px; }
    .menu-link { display: flex; align-items: center; gap: 10px; padding: 10px 1.25rem; text-decoration: none; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.15s; }
    .menu-link:hover { background: var(--surface2); color: var(--text); }
    .menu-link-num { font-size: 10px; color: var(--text3); width: 20px; flex-shrink: 0; }
    .menu-link-text { flex: 1; }
    .menu-link-sub { font-size: 10px; color: var(--text3); }
  </style>
</head>
<body>
<!-- TABLE EDITOR MODAL -->
<div class="modal-overlay" id="table-editor-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">editar tabla anual</span>
      <button class="btn-back" onclick="closeTableEditor()">✕</button>
    </div>
    <div id="table-editor-body"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeTableEditor()">cancelar</button>
      <button class="btn-primary" onclick="saveTableEdits()">guardar cambios</button>
    </div>
  </div>
</div>

<div class="top-bar">
  <div>
    <div class="day-name" id="day-name"></div>
    <div class="full-date" id="full-date"></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn-back" onclick="toggleTheme()">◐</button>
    <a class="btn-back" href="planeacion.html">← planeación</a>
    <button class="menu-btn" onclick="openMenu()" title="menú">☰</button>
  </div>
</div>

<div class="content">

  <!-- ESTE MES -->
  <div>
    <div class="section-label">lo que toca este mes</div>
    <div class="card">
      <div class="month-header">
        <span class="month-name" id="this-month-name"></span>
        <span class="month-sub">2026</span>
      </div>
      <div class="this-month-grid" id="this-month-grid"></div>
      <!-- PROGRESO DEL MES -->
      <div class="month-prog-section">
        <div class="month-prog-title">progreso de este mes</div>
        <div id="month-progress"></div>
      </div>
    </div>
  </div>

  <!-- TABLA ANUAL -->
  <div>
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.6rem;">
      <div class="section-label" style="margin:0;">tabla anual 2026</div>
      <button style="font-size:11px; background:none; border:0.5px solid var(--border); border-radius:var(--r-sm); color:var(--text3); font-family:'DM Mono',monospace; padding:4px 10px; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'" onclick="openTableEditor()">✎ editar tabla</button>
    </div>
    <div class="card" style="padding:0.75rem;">
      <div class="table-scroll">
        <table class="annual-table" id="annual-table"></table>
      </div>
    </div>
  </div>

  <!-- PROGRESO ANUAL -->
  <div>
    <div class="section-label">progreso anual</div>
    <div class="card">
      <div class="progress-section" id="progress-section"></div>
    </div>
  </div>

  <div class="nav-grid">
    <a class="nav-card" href="planeacion.html">
      <div class="nav-num">←</div>
      <div class="nav-title">planeación</div>
      <div class="nav-sub">volver</div>
    </a>
    <a class="nav-card" href="listas.html">
      <div class="nav-num">→</div>
      <div class="nav-title">listas</div>
      <div class="nav-sub">películas, podcasts, temas</div>
    </a>
  </div>
</div>

<script>
// ── THEME ──
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('tracker_theme', next);
}
(function(){ const t = localStorage.getItem('tracker_theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();

const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const NOW = new Date();
const THIS_MONTH = NOW.getMonth();
document.getElementById('day-name').textContent = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][NOW.getDay()];
document.getElementById('full-date').textContent = `${NOW.getDate()} de ${MONTHS[NOW.getMonth()]}, ${NOW.getFullYear()}`;
document.getElementById('this-month-name').textContent = MONTHS[THIS_MONTH];

// ── DONE STATE ──
let doneState = JSON.parse(localStorage.getItem('annual_done') || '{}');
function isDone(key) { return !!doneState[key]; }
function toggleDone(key) {
  doneState[key] = !doneState[key];
  localStorage.setItem('annual_done', JSON.stringify(doneState));
  renderAll();
}

// ── BOOK PAGES (editable) ──
const DEFAULT_PAGES = {
  // Lista A
  'a_locke':390, 'a_pavlov':430, 'a_schedules':300, 'a_walden2':320,
  'a_about':280, 'a_aba_cooper':800, 'a_kazdin':350, 'a_interbeh':400,
  'a_loftus':320, 'a_keller':280, 'a_saving':320, 'a_hardy':480,
  'a_barlow':720, 'a_mito':280, 'a_freud_intro':350, 'a_mas_alla':120,
  'a_persona':360, 'a_damasio':380, 'a_profecy':320,
  // Lista B
  'b_historia':620, 'b_origen':480, 'b_segundo':800, 'b_genero':320,
  'b_prehistoria':220, 'b_animales':500, 'b_behavior':400, 'b_liquida':240,
  'b_naval':200, 'b_antifragil':544, 'b_tecno':280, 'b_economista':320,
  'b_sapiens':500, 'b_grafica':280, 'b_cerebro':240, 'b_cosmos':365,
  'b_estructura':240, 'b_homo_deus':450,
  // Lista C (3 per month × 12 = 36 books, ~220pp avg)
  'c_chernobyl':340, 'c_extranjero':160, 'c_doble':180,
  'c_cronica':130, 'c_fahrenheit':256, 'c_tunel':160,
  'c_levedad':320, 'c_dorian':256, 'c_guardian':280,
  'c_cien':432, 'c_nombre':600, 'c_perfume':320,
  'c_detectives':736, 'c_nunca':288, 'c_casa':450,
  'c_ender':226, 'c_crimen':560, 'c_senor':1200,
  'c_interminable':460, 'c_ceguera':352, 'c_dracula':488,
  'c_viejo':132, 'c_metamorfosis':96, 'c_rayuela':736,
  'c_pilares':1000, 'c_ruisenor':336, 'c_principito':96,
  'c_jane':560, 'c_frankenstein':288, 'c_carretera':320,
  'c_1984':368, 'c_rebelion':144, 'c_siddhartha':160,
  'c_hobbit':310, 'c_orgullo':432, 'c_guardian2':277,
  // Lista D
  'd_macro':480, 'd_crimi_intro':380, 'd_crimi':420,
};
let bookPages = JSON.parse(localStorage.getItem('annual_book_pages') || 'null') || {...DEFAULT_PAGES};
function saveBookPages() { localStorage.setItem('annual_book_pages', JSON.stringify(bookPages)); }

// ── PLAN DATA ──
// Each task: { key, text, color, pay? }
// Months: 0=Jan ... 11=Dec

const CAT_COLORS = {
  psic: '#7a4a9a', soft: '#2c6fad', ingles: '#3a7a6a',

// ── RENDER THIS MONTH ──
function renderThisMonth() {
  const grid = document.getElementById('this-month-grid');
  let html = '';
  Object.keys(PLAN).forEach(cat => {
    const tasks = PLAN[cat].filter(t => t.m === THIS_MONTH);
    if (!tasks.length) return;
    const color = CAT_COLORS[cat];
    html += `<div class="tm-cat" style="border-left-color:${color}">
      <div class="tm-cat-label" style="color:${color}">${CAT_LABELS[cat]}</div>
      <div class="tm-tasks">`;
    tasks.forEach(t => {
      const done = isDone(t.key);
      html += `<div class="tm-task ${done?'done':''}" onclick="toggleDone('${t.key}')">
        <div class="tm-task-dot" style="background:${done?'var(--normal)':color}"></div>
        <span class="tm-task-text">${t.text}${t.pay?`<span class="pay-badge">$${t.pay}</span>`:''}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  if (!html) html = `<div style="color:var(--text3);font-size:13px;font-style:italic;font-family:'Cormorant Garamond',serif;">sin tareas para este mes</div>`;
  grid.innerHTML = html;
}

// ── RENDER MONTHLY PROGRESS ──
function renderMonthProgress() {
  const container = document.getElementById('month-progress');
  const cats = Object.keys(PLAN);
  let html = '';
  cats.forEach(cat => {
    const tasks = PLAN[cat].filter(t => t.m === THIS_MONTH);
    if (!tasks.length) return;
    const total = tasks.length;
    const done  = tasks.filter(t => isDone(t.key)).length;
    const pct   = Math.round(done / total * 100);
    html += `<div class="month-prog-item">
      <span class="month-prog-label" style="color:${CAT_COLORS[cat]}">${CAT_LABELS[cat]}</span>
      <div class="month-prog-track"><div class="month-prog-fill" style="width:${pct}%; background:${CAT_COLORS[cat]}"></div></div>
      <span class="month-prog-num">${done}/${total}</span>
    </div>`;
  });
  container.innerHTML = html || `<div style="font-size:11px;color:var(--text3);">sin tareas este mes</div>`;
}
function renderTable() {
  const cats = Object.keys(PLAN);
  const table = document.getElementById('annual-table');
  let html = '<thead><tr><th>mes</th>';
  cats.forEach(cat => { html += `<th style="color:${CAT_COLORS[cat]}">${CAT_LABELS[cat]}</th>`; });
  html += '</tr></thead><tbody>';

  for (let m = 0; m < 12; m++) {
    const isCurrentMonth = m === THIS_MONTH;
    html += `<tr class="${isCurrentMonth?'current-month':''}">`;
    html += `<td>${MONTHS[m].slice(0,3)}</td>`;
    cats.forEach(cat => {
      const tasks = PLAN[cat].filter(t => t.m === m);
      if (!tasks.length) { html += `<td><span class="cell-empty">—</span></td>`; return; }
      html += `<td>`;
      tasks.forEach(t => {
        const done = isDone(t.key);
        html += `<div class="task-item ${done?'done':''}" onclick="toggleDone('${t.key}')">
          <div class="task-dot" style="background:${CAT_COLORS[cat]}"></div>
          <span class="task-text">${t.text}${t.pay?`<span class="pay-tag">$${t.pay}</span>`:''}</span>
        </div>`;
      });
      html += `</td>`;
    });
    html += '</tr>';
  }
  html += '</tbody>';
  table.innerHTML = html;
}

let editorPlan = null;

function openTableEditor() {
  editorPlan = JSON.parse(JSON.stringify(PLAN));
  renderTableEditorBody();
  document.getElementById('table-editor-modal').classList.add('open');
}

function closeTableEditor() {
  document.getElementById('table-editor-modal').classList.remove('open');
}

function renderTableEditorBody() {
  const body = document.getElementById('table-editor-body');
  body.innerHTML = Object.keys(editorPlan).map(cat => `
    <div class="ed-cat-block">
      <div class="ed-cat-label" style="color:${CAT_COLORS[cat]}">${CAT_LABELS[cat]}</div>
      <div id="ed-cat-${cat}">
        ${editorPlan[cat].map((t, i) => `
          <div class="ed-task-row">
            <select onchange="editorPlan['${cat}'][${i}].m=parseInt(this.value)" style="width:80px;">
              ${MONTHS.map((m,mi)=>`<option value="${mi}" ${t.m===mi?'selected':''}>${m.slice(0,3)}</option>`).join('')}
            </select>
            <input type="text" value="${t.text.replace(/"/g,'&quot;')}"
              oninput="editorPlan['${cat}'][${i}].text=this.value" />
            <input type="number" min="0" placeholder="$pago" value="${t.pay||''}"
              oninput="editorPlan['${cat}'][${i}].pay=this.value?parseInt(this.value):null"
              style="width:65px;" title="pago ($)" />
            <button class="btn-del-sm" onclick="editorPlan['${cat}'].splice(${i},1); renderTableEditorBody();">✕</button>
          </div>
        `).join('')}
      </div>
      <button class="btn-add-task" onclick="editorPlan['${cat}'].push({m:${THIS_MONTH},key:'new_${cat}_'+Date.now(),text:'nueva tarea'}); renderTableEditorBody();">+ tarea</button>
    </div>
  `).join('');
}

function saveTableEdits() {
  Object.keys(editorPlan).forEach(cat => { PLAN[cat] = editorPlan[cat]; });
  localStorage.setItem('annual_plan_overrides', JSON.stringify(PLAN));
  closeTableEditor();
  renderAll();
}

// Load any saved overrides
(function loadOverrides() {
  const saved = localStorage.getItem('annual_plan_overrides');
  if (saved) {
    try {
      const overrides = JSON.parse(saved);
      Object.keys(overrides).forEach(cat => { if (PLAN[cat]) PLAN[cat] = overrides[cat]; });
    } catch(e) {}
  }
})();
function calcPages(tasks) {
  let total = 0, done = 0;
  tasks.forEach(t => {
    if (!t.pageKey) return;
    const p = bookPages[t.pageKey] || 0;
    total += p;
    if (isDone(t.key)) done += p;
  });
  return { total, done };
}

  items.forEach(item => {
    const pct = item.total > 0 ? Math.min(100, Math.round(item.done / item.total * 100)) : 0;
    html += `<div class="prog-item">
      <div class="prog-header">
        <span class="prog-title" style="color:${item.color}">${item.label}</span>
        <span class="prog-nums">${item.done} / ${item.total} ${item.unit} · ${pct}%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%; background:${item.color}"></div></div>
      <div class="prog-sub">meta: ${item.goal}</div>`;

    if (item.isBook) {
      const panelId = 'book-edit-' + item.id;
      html += `<button class="btn-edit-pages" id="btn-${panelId}" onclick="toggleBookEditor('${panelId}')">✎ editar páginas</button>
        <div class="book-edit-panel" id="${panelId}">
          <div class="book-edit-grid">`;
      item.tasks.forEach(t => {
        if (!t.pageKey) return;
        html += `<div class="book-edit-row">
          <span class="book-edit-name">${t.text.split('·')[0].trim()}</span>
          <input type="number" min="1" max="2000" value="${bookPages[t.pageKey]||0}"
            onchange="bookPages['${t.pageKey}']=parseInt(this.value)||0; saveBookPages(); renderProgress();" />
        </div>`;
      });
      html += `</div>
          <button class="btn-primary" style="font-size:11px; margin-top:4px;" onclick="saveBookPages(); renderProgress();">guardar páginas</button>
        </div>`;
    }

    html += `</div>`;
  });

  container.innerHTML = html;
}

// ── RENDER ALL ──
function renderAll() {
  renderThisMonth();
  renderMonthProgress();
  renderTable();
  renderProgress();
}

renderAll();

// ── MENU ──
function openMenu() {
  document.getElementById('menu-drawer').classList.add('open');
  document.getElementById('menu-overlay').classList.add('open');
}
function closeMenu() {
  document.getElementById('menu-drawer').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('open');
}
</script>
