<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>listas · tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f3ef; --surface: #ffffff; --surface2: #f0ede8;
      --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
      --text: #1a1916; --text2: #6a6760; --text3: #aaa89f;
      --accent: #8a6a4a; --accent2: #b09070; --normal: #3a6a52;
      --urgent: #b84030; --r: 10px; --r-sm: 6px;
    }
    [data-theme="dark"] {
      --bg: #141414; --surface: #1e1e1e; --surface2: #282828;
      --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.18);
      --text: #f0ede6; --text2: #c9a96e; --text3: #7a6a55;
      --accent: #c9a96e; --accent2: #a08050; --normal: #6aaa82;
      --urgent: #d4694a;
    }
    [data-theme="dark"] .section-label, [data-theme="dark"] .nav-title,
    [data-theme="dark"] .day-name, [data-theme="dark"] .list-title { font-weight: 500; }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 24px; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 0 0 6rem; transition: background 0.2s, color 0.2s; }

    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem 1rem; border-bottom: 0.5px solid var(--border); }
    .day-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--accent); letter-spacing: 0.08em; }
    .full-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .btn-back { background: none; border: 0.5px solid var(--border2); border-radius: var(--r-sm); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.2s; }
    .btn-back:hover { color: var(--accent); border-color: var(--accent2); }

    .content { padding: 1.25rem 1.25rem 0; display: flex; flex-direction: column; gap: 1.25rem; }
    .section-label { font-size: 11px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 0.6rem; }

    input[type=text], textarea {
      font-family: 'DM Mono', monospace; font-size: 14px;
      background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); padding: 8px 10px;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    input[type=text]:focus, textarea:focus { border-color: var(--border2); }
    input[type=text]::placeholder, textarea::placeholder { color: var(--text3); }

    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: var(--r-sm); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; padding: 8px 16px; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: none; border: 0.5px solid var(--border2); border-radius: var(--r-sm); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 14px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-ghost:hover { color: var(--accent); border-color: var(--accent2); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--r); padding: 1.25rem; width: 100%; max-width: 500px; margin: auto; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 0.5px solid var(--border); padding-bottom: 0.75rem; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--text); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; padding-top: 0.75rem; border-top: 0.5px solid var(--border); }

    /* ── LIST CARD ── */
    .list-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .list-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.875rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .list-header:hover { background: var(--surface2); }

    .list-icon { font-size: 14px; flex-shrink: 0; }
    .list-title { flex: 1; font-size: 15px; color: var(--text); }
    .list-count { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
    .list-chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
    .list-card.open .list-chevron { transform: rotate(90deg); }

    .list-body { display: none; border-top: 0.5px solid var(--border); }
    .list-card.open .list-body { display: block; }

    /* QUICK ADD */
    .quick-add {
      display: flex; gap: 8px; padding: 10px 12px;
      border-bottom: 0.5px solid var(--border);
      background: var(--surface2);
    }
    .quick-add input { flex: 1; font-size: 13px; padding: 7px 10px; }
    .quick-add-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--r-sm); font-family: 'DM Mono', monospace;
      font-size: 13px; padding: 7px 14px; cursor: pointer;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .quick-add-btn:hover { opacity: 0.85; }

    /* PREVIEW — first 3 items */
    .list-preview {
      padding: 8px 12px;
      display: flex; flex-direction: column; gap: 4px;
    }

    .preview-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text2);
      padding: 3px 0;
    }
    .preview-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .preview-more { font-size: 11px; color: var(--text3); font-style: italic; padding: 2px 0; }

    /* OPEN LIST BUTTON */
    .open-list-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      border-top: 0.5px solid var(--border);
      font-size: 11px; color: var(--text3);
      cursor: pointer; background: none; border-left: none; border-right: none; border-bottom: none;
      width: 100%; font-family: 'DM Mono', monospace;
      transition: all 0.15s;
    }
    .open-list-btn:hover { color: var(--accent); background: rgba(138,106,74,0.04); }

    /* FULL LIST MODAL */
    .full-list { display: flex; flex-direction: column; gap: 5px; }
    .full-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 10px; background: var(--surface2);
      border-radius: var(--r-sm); border-left: 2px solid var(--border2);
      transition: all 0.15s;
    }
    .full-item:hover { border-left-color: var(--accent2); }
    .full-item.no-action { border-left-color: var(--text3); opacity: 0.65; }
    .full-item-text { flex: 1; font-size: 13px; color: var(--text); line-height: 1.4; }
    .full-item-note { font-size: 10px; color: var(--text3); margin-top: 2px; }
    .full-item-actions { display: flex; gap: 5px; align-items: flex-start; flex-shrink: 0; }
    .tag-no-action {
      font-size: 9px; padding: 2px 7px; border-radius: 999px;
      background: var(--surface2); border: 0.5px solid var(--border2);
      color: var(--text3); white-space: nowrap;
    }
    .btn-del-item { background: none; border: none; color: var(--text3); font-size: 13px; cursor: pointer; transition: color 0.15s; padding: 0; }
    .btn-del-item:hover { color: var(--urgent); }

    /* TOGGLE NO-ACTION */
    .btn-no-action {
      font-size: 9px; padding: 2px 7px; border-radius: 999px;
      border: 0.5px solid var(--border2); background: transparent;
      color: var(--text3); cursor: pointer; font-family: 'DM Mono', monospace;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn-no-action.active { background: rgba(170,168,159,0.2); border-color: var(--text3); }

    /* LISTS MANAGER MODAL */
    .mgr-list-row { display: flex; gap: 8px; align-items: center; padding: 8px 10px; background: var(--surface2); border-radius: var(--r-sm); margin-bottom: 5px; }
    .mgr-icon-input { width: 40px; text-align: center; font-size: 16px; padding: 5px 4px; }
    .mgr-name-input { flex: 1; font-size: 13px; }
    .mgr-del { background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; transition: color 0.15s; }
    .mgr-del:hover { color: var(--urgent); }

    /* NAV */
    .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 0.5rem; }
    .nav-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1rem; text-decoration: none; display: flex; flex-direction: column; gap: 5px; transition: border-color 0.2s; }
    .nav-card:hover { border-color: var(--border2); background: var(--surface2); }
    .nav-num { font-size: 11px; color: var(--text3); }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 400; color: var(--text); }
    .nav-sub { font-size: 10px; color: var(--text3); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── HAMBURGER MENU ── */
    .menu-btn { background: none; border: 0.5px solid var(--border2); border-radius: var(--r-sm); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 16px; padding: 5px 10px; cursor: pointer; transition: all 0.2s; line-height: 1; }
    .menu-btn:hover { color: var(--accent); border-color: var(--accent2); }
    .menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; }
    .menu-overlay.open { display: block; }
    .menu-drawer { position: fixed; top: 0; right: -280px; bottom: 0; width: 260px; background: var(--surface); border-left: 0.5px solid var(--border2); z-index: 301; padding: 0; transition: right 0.25s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; overflow-y: auto; }
    .menu-drawer.open { right: 0; }
    .menu-drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.25rem 1rem; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .menu-drawer-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; color: var(--accent); font-style: italic; }
    .menu-close { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 0; transition: color 0.15s; }
    .menu-close:hover { color: var(--text); }
    .menu-section { padding: 0.75rem 0; border-bottom: 0.5px solid var(--border); }
    .menu-section:last-child { border-bottom: none; }
    .menu-section-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 0 1.25rem; margin-bottom: 4px; }
    .menu-link { display: flex; align-items: center; gap: 10px; padding: 10px 1.25rem; text-decoration: none; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.15s; }
    .menu-link:hover { background: var(--surface2); color: var(--text); }
    .menu-link-num { font-size: 10px; color: var(--text3); width: 20px; flex-shrink: 0; }
    .menu-link-text { flex: 1; }
    .menu-link-sub { font-size: 10px; color: var(--text3); }
  </style>
</head>
<body>

<!-- FULL LIST MODAL -->
<div class="modal-overlay" id="full-list-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="full-list-title"></span>
      <button class="btn-back" onclick="closeFullList()">✕</button>
    </div>
    <div class="full-list" id="full-list-body"></div>
  </div>
</div>

<!-- LISTS MANAGER MODAL -->
<div class="modal-overlay" id="mgr-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">administrar listas</span>
      <button class="btn-back" onclick="closeMgr()">✕</button>
    </div>
    <div style="font-size:10px; color:var(--text3); margin-bottom:10px; letter-spacing:0.05em;">
      ícono · nombre · eliminar. El orden se refleja en la página.
    </div>
    <div id="mgr-body"></div>
    <button style="font-size:11px; font-family:'DM Mono',monospace; background:none; border:0.5px dashed var(--border2); border-radius:var(--r-sm); color:var(--text3); padding:6px 12px; cursor:pointer; width:100%; margin-top:6px; transition:all 0.15s;"
      onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'"
      onclick="addMgrList()">+ nueva lista</button>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeMgr()">cancelar</button>
      <button class="btn-primary" onclick="saveMgr()">guardar</button>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div>
    <div class="day-name" id="day-name"></div>
    <div class="full-date" id="full-date"></div>
  </div>
  <div style="display:flex; gap:8px; align-items:center;">
    <button class="btn-back" onclick="toggleTheme()">◐</button>
    <a class="btn-back" href="index.html">← inicio</a>
    <button class="menu-btn" onclick="openMenu()" title="menú">☰</button>
  </div>
</div>

<div class="content">

  <div style="display:flex; justify-content:space-between; align-items:baseline;">
    <div class="section-label" style="margin:0;">mis listas</div>
    <button style="font-size:11px; background:none; border:0.5px solid var(--border); border-radius:var(--r-sm); color:var(--text3); font-family:'DM Mono',monospace; padding:4px 10px; cursor:pointer; transition:all 0.2s;"
      onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'"
      onclick="openMgr()">✎ administrar listas</button>
  </div>

  <div id="lists-container" style="display:flex; flex-direction:column; gap:10px;"></div>

  <div class="nav-grid">
    <a class="nav-card" href="planeacion.html">
      <div class="nav-num">←</div>
      <div class="nav-title">planeación</div>
      <div class="nav-sub">volver</div>
    </a>
    <a class="nav-card" href="index.html">
      <div class="nav-num">←</div>
      <div class="nav-title">inicio</div>
      <div class="nav-sub">dashboard</div>
    </a>
  </div>

</div>

<script>
// ── THEME ──
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('tracker_theme', next);
}
(function(){ const t = localStorage.getItem('tracker_theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();

// ── DATE ──
const DAYS   = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const NOW    = new Date();
document.getElementById('day-name').textContent  = DAYS[NOW.getDay()];
document.getElementById('full-date').textContent = `${NOW.getDate()} de ${MONTHS[NOW.getMonth()]}, ${NOW.getFullYear()}`;

// ── DEFAULT LISTS CONFIG ──
const DEFAULT_LISTS = [
  { id: 'temas',    icon: '◎', name: 'temas para investigar',  showNoAction: false },
  { id: 'tareas',   icon: '◇', name: 'tareas por hacer',       showNoAction: true  },
  { id: 'pelis',    icon: '▷', name: 'películas',              showNoAction: false },
  { id: 'podcast',  icon: '◉', name: 'podcasts',               showNoAction: false },
];

// ── STATE ──
let listsConfig = JSON.parse(localStorage.getItem('lists_config') || 'null') || JSON.parse(JSON.stringify(DEFAULT_LISTS));
let listsData   = JSON.parse(localStorage.getItem('lists_data')   || '{}');
// listsData[listId] = [ { id, text, note, noAction } ]

function saveAll() {
  localStorage.setItem('lists_config', JSON.stringify(listsConfig));
  localStorage.setItem('lists_data',   JSON.stringify(listsData));
}

// ── HELPERS ──
function getItems(listId) { return listsData[listId] || []; }

function addItem(listId, text, note) {
  if (!text.trim()) return;
  if (!listsData[listId]) listsData[listId] = [];
  listsData[listId].unshift({ id: Date.now(), text: text.trim(), note: note||'', noAction: false });
  saveAll();
}

function deleteItem(listId, itemId) {
  if (!listsData[listId]) return;
  listsData[listId] = listsData[listId].filter(i => i.id !== itemId);
  saveAll();
}

function toggleNoAction(listId, itemId) {
  const item = (listsData[listId]||[]).find(i => i.id === itemId);
  if (item) item.noAction = !item.noAction;
  saveAll();
}

// ── RENDER LISTS ──
let openListId = null; // track which modal is open

function renderLists() {
  const container = document.getElementById('lists-container');
  container.innerHTML = '';

  listsConfig.forEach(list => {
    const items   = getItems(list.id);
    const total   = items.length;
    const preview = items.slice(0, 3);

    const card = document.createElement('div');
    card.className = 'list-card';
    card.id = 'card-' + list.id;

    card.innerHTML = `
      <!-- HEADER -->
      <div class="list-header" onclick="toggleCard('${list.id}')">
        <span class="list-icon">${list.icon}</span>
        <span class="list-title">${list.name}</span>
        <span class="list-count">${total} elemento${total!==1?'s':''}</span>
        <span class="list-chevron">›</span>
      </div>

      <!-- BODY (collapsed by default) -->
      <div class="list-body">

        <!-- QUICK ADD -->
        <div class="quick-add">
          <input type="text" id="input-${list.id}" placeholder="agregar a ${list.name}..."
            onkeydown="if(event.key==='Enter') quickAdd('${list.id}')" />
          <button class="quick-add-btn" onclick="quickAdd('${list.id}')">+ agregar</button>
        </div>

        <!-- PREVIEW -->
        <div class="list-preview" id="preview-${list.id}">
          ${preview.map(item => `
            <div class="preview-item">
              <div class="preview-dot"></div>
              <span style="flex:1; font-size:12px; color:var(--text2); ${item.noAction?'opacity:0.55;':''}">${item.text}</span>
              ${item.noAction ? `<span class="tag-no-action">sin acción</span>` : ''}
            </div>
          `).join('')}
          ${total > 3 ? `<div class="preview-more">+ ${total-3} más...</div>` : ''}
          ${total === 0 ? `<div style="font-size:12px; color:var(--text3); font-style:italic; font-family:'Cormorant Garamond',serif; padding:4px 0;">lista vacía</div>` : ''}
        </div>

        <!-- OPEN FULL LIST -->
        <button class="open-list-btn" onclick="openFullList('${list.id}')">
          <span>abrir lista completa</span>
          <span>→</span>
        </button>

      </div>
    `;

    container.appendChild(card);
  });
}

function toggleCard(listId) {
  const card = document.getElementById('card-' + listId);
  card.classList.toggle('open');
  if (card.classList.contains('open')) {
    setTimeout(() => {
      const input = document.getElementById('input-' + listId);
      if (input) input.focus();
    }, 50);
  }
}

function quickAdd(listId) {
  const input = document.getElementById('input-' + listId);
  if (!input) return;
  addItem(listId, input.value);
  input.value = '';
  renderLists();
  // keep card open
  const card = document.getElementById('card-' + listId);
  if (card) card.classList.add('open');
  // refresh modal if open
  if (openListId === listId) renderFullListBody(listId);
}

// ── FULL LIST MODAL ──
function openFullList(listId) {
  openListId = listId;
  const list = listsConfig.find(l => l.id === listId);
  document.getElementById('full-list-title').textContent = list ? `${list.icon} ${list.name}` : listId;
  renderFullListBody(listId);
  document.getElementById('full-list-modal').classList.add('open');
}

function closeFullList() {
  document.getElementById('full-list-modal').classList.remove('open');
  openListId = null;
  renderLists();
}

function renderFullListBody(listId) {
  const list  = listsConfig.find(l => l.id === listId);
  const items = getItems(listId);
  const body  = document.getElementById('full-list-body');

  if (items.length === 0) {
    body.innerHTML = `<div style="font-size:13px; color:var(--text3); text-align:center; padding:2rem 0; font-style:italic; font-family:'Cormorant Garamond',serif;">lista vacía — agrega elementos desde la tarjeta</div>`;
    return;
  }

  // Sort: noAction items at bottom
  const sorted = [...items].sort((a,b) => (a.noAction?1:0) - (b.noAction?1:0));

  body.innerHTML = sorted.map(item => `
    <div class="full-item ${item.noAction ? 'no-action' : ''}" id="fitem-${item.id}">
      <div style="flex:1;">
        <div class="full-item-text">${item.text.replace(/</g,'&lt;')}</div>
        ${item.note ? `<div class="full-item-note">${item.note}</div>` : ''}
      </div>
      <div class="full-item-actions">
        ${list && list.showNoAction ? `
          <button class="btn-no-action ${item.noAction?'active':''}"
            onclick="toggleNoAction('${listId}',${item.id}); renderFullListBody('${listId}');">
            ${item.noAction ? '↺ activar' : 'sin acción'}
          </button>` : ''}
        <button class="btn-del-item" onclick="deleteItem('${listId}',${item.id}); renderFullListBody('${listId}');">✕</button>
      </div>
    </div>
  `).join('');
}

// ── LISTS MANAGER ──
let mgrData = null;

function openMgr() {
  mgrData = JSON.parse(JSON.stringify(listsConfig));
  renderMgrBody();
  document.getElementById('mgr-modal').classList.add('open');
}

function closeMgr() {
  document.getElementById('mgr-modal').classList.remove('open');
}

function renderMgrBody() {
  document.getElementById('mgr-body').innerHTML = mgrData.map((l, i) => `
    <div class="mgr-list-row">
      <input type="text" class="mgr-icon-input" value="${l.icon}"
        oninput="mgrData[${i}].icon=this.value" placeholder="◎" />
      <input type="text" class="mgr-name-input" value="${l.name.replace(/"/g,'&quot;')}"
        oninput="mgrData[${i}].name=this.value" placeholder="nombre de la lista" />
      <label style="display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text3); white-space:nowrap; cursor:pointer;">
        <input type="checkbox" ${l.showNoAction?'checked':''} onchange="mgrData[${i}].showNoAction=this.checked" />
        sin acción
      </label>
      <button class="mgr-del" onclick="mgrData.splice(${i},1); renderMgrBody();">✕</button>
    </div>
  `).join('');
}

function addMgrList() {
  mgrData.push({ id: 'list_' + Date.now(), icon: '◎', name: 'nueva lista', showNoAction: false });
  renderMgrBody();
}

function saveMgr() {
  listsConfig = JSON.parse(JSON.stringify(mgrData));
  saveAll();
  closeMgr();
  renderLists();
}

// ── CLOSE MODALS ON BACKDROP ──
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) { o.classList.remove('open'); if (o.id==='full-list-modal') { openListId=null; renderLists(); } } });
});

// ── INIT ──
renderLists();

// ── MENU ──
function openMenu() {
  document.getElementById('menu-drawer').classList.add('open');
  document.getElementById('menu-overlay').classList.add('open');
}
function closeMenu() {
  document.getElementById('menu-drawer').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('open');
}
</script>
